name: yaya_eats
description: "YaYa Eats - App de delivery de comida"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  mapbox_maps_flutter: ^2.0.0
  google_sign_in: ^6.2.2
  lottie: ^3.1.2
  font_awesome_flutter: ^10.7.0
  image_picker: ^1.1.2
  shared_preferences: ^2.3.0
  flutter_dotenv: ^5.2.1
  gal: ^2.3.0
  cached_network_image: ^3.4.1
  geolocator: ^13.0.0
  firebase_core: ^3.13.1
  firebase_messaging: ^15.2.5
  flutter_local_notifications: ^18.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "ordenar-comida.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/
